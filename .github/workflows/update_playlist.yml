# .github/workflows/update_playlist.yml
name: INA TV M3U Auto Update

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install Chrome
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y google-chrome-stable

    - name: Install Python Packages
      run: |
        pip install -q requests beautifulsoup4 selenium \
                       webdriver-manager PyGithub

    - name: Git Config
      run: |
        git config user.email "action@github.com"
        git config user.name "GitHub Action Bot"

    - name: Run Updater
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GITHUB_REPO: ${{ github.repository }}
      run: python updater.py

    - name: Push with Retry
      run: |
        # Remote'u fetch et
        git fetch origin main
        
        # Staged dosyaları kontrol et
        git add -A
        
        if git diff --staged --quiet; then
          echo "✅ Değişiklik yok, push atlanıyor"
          exit 0
        fi
        
        # Commit yap
        git commit -m "🔄 INA TV Güncellendi - $(date '+%Y-%m-%d %H:%M')"
        
        # Push dene (3 kez)
        for i in 1 2 3; do
          echo "Push denemesi $i..."
          
          git pull --rebase origin main && \
          git push origin main && \
          echo "✅ Push başarılı!" && \
          exit 0
          
          echo "⚠️ Deneme $i başarısız, tekrar deneniyor..."
          sleep 5
        done
        
        echo "❌ Push başarısız!"
        exit 1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
